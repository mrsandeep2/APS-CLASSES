<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff" rx="20"/>
  
  <!-- Gradient for depth -->
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stack of books -->
  <rect x="50" y="85" width="60" height="45" fill="url(#bookGradient)" rx="4"/>
  <rect x="55" y="80" width="60" height="45" fill="#3b82f6" rx="4" opacity="0.7"/>
  <rect x="60" y="75" width="60" height="45" fill="#2563eb" rx="4"/>
  
  <!-- Book spine lines -->
  <line x1="60" y1="95" x2="120" y2="95" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="110" x2="120" y2="110" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  
  <!-- Graduation cap -->
  <path d="M 100 60 L 80 45 L 120 45 Z" fill="url(#capGradient)" stroke="#6d28d9" stroke-width="2"/>
  <rect x="80" y="48" width="40" height="4" fill="url(#capGradient)"/>
  <circle cx="100" cy="52.5" r="3" fill="#fbbf24"/>
  
  <!-- Academic star/excellence indicator -->
  <g>
    <circle cx="155" cy="50" r="18" fill="#fbbf24" opacity="0.9"/>
    <text x="155" y="58" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">★</text>
  </g>
</svg>
