<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Simplified book icon -->
  <g transform="translate(25, 35)">
    <!-- Book cover -->
    <rect x="0" y="10" width="25" height="20" fill="#ffffff" stroke="#1e40af" stroke-width="1.5" rx="1"/>
    <rect x="3" y="13" width="19" height="3" fill="#fbbf24" opacity="0.8"/>
    
    <!-- Graduation cap -->
    <path d="M 35 8 L 28 3 L 42 3 Z" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <rect x="28" y="5" width="14" height="2" fill="#8b5cf6"/>
    <circle cx="35" cy="6.5" r="1.2" fill="#fbbf24"/>
  </g>
</svg>
